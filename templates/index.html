<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake News Detector Pro</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-top: 20px;
        }
        h1 { 
            color: white; 
            text-align: center; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .header { 
            background: rgba(255,255,255,0.1); 
            padding: 20px; 
            border-radius: 10px; 
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }
        textarea, input { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            border: 2px solid #ddd; 
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        textarea:focus, input:focus { 
            border-color: #667eea; 
            outline: none;
        }
        button { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; 
            padding: 12px 25px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            margin: 5px;
            font-size: 16px;
            transition: transform 0.2s;
        }
        button:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .result { 
            margin-top: 25px; 
            padding: 20px; 
            border-radius: 10px;
            border-left: 5px solid;
        }
        .high-confidence { 
            background: #d4edda; 
            border-color: #28a745;
        }
        .medium-confidence { 
            background: #fff3cd; 
            border-color: #ffc107;
        }
        .low-confidence { 
            background: #f8d7da; 
            border-color: #dc3545;
        }
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 15px; 
            margin: 15px 0;
        }
        .stat-card { 
            background: white; 
            padding: 15px; 
            border-radius: 8px; 
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .admin-panel { 
            background: #f8f9fa; 
            padding: 15px; 
            border-radius: 8px; 
            margin: 20px 0;
            border-left: 4px solid #667eea;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔍 Fake News Detector Pro</h1>
        <p style="color: white; text-align: center;">Проверьте достоверность новостей с помощью AI и системы репутации источников</p>
    </div>

    <div class="container">
        <div>
            <label><b>Текст новости:</b></label>
            <textarea id="newsText" rows="6" placeholder="Введите текст новости для анализа..."></textarea>
            
            <label><b>URL источника (опционально):</b></label>
            <input type="text" id="newsUrl" placeholder="https://example.com/news...">
            
            <button onclick="analyzeNews()">🔍 Анализировать новость</button>
            <button onclick="clearForm()">🗑️ Очистить</button>
            <button onclick="showExample()">📋 Пример</button>
        </div>

        <div id="result"></div>

        <div class="admin-panel">
            <h3>⚙️ Панель администратора</h3>
            <button onclick="updateDataset()">🔄 Обновить датасет</button>
            <button onclick="checkStatus()">📊 Статус системы</button>
            <div id="adminResult" style="margin-top: 10px;"></div>
        </div>
    </div>

    <script>
        async function analyzeNews() {
            const text = document.getElementById('newsText').value.trim();
            const url = document.getElementById('newsUrl').value.trim();
            
            if (!text) {
                alert('Введите текст новости');
                return;
            }
            
            showLoading();
            
            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, url })
                });
                
                const result = await response.json();
                displayResult(result);
            } catch (error) {
                showError('Ошибка при анализе: ' + error.message);
            }
        }
        
        function displayResult(data) {
            const resultDiv = document.getElementById('result');
            
            if (data.error) {
                resultDiv.innerHTML = `<div class="result low-confidence">❌ ${data.error}</div>`;
                return;
            }
            
            const verdict = data.final_verdict;
            const confidenceClass = verdict.confidence + '-confidence';
            
            let html = `
                <div class="result ${confidenceClass}">
                    <h2>${verdict.verdict}</h2>
                    <p><b>Объяснение:</b> ${verdict.explanation}</p>
                    <p><b>Общая уверенность:</b> ${(verdict.score * 100).toFixed(1)}%</p>
                    
                    <h3>🤖 Анализ AI</h3>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <b>Вердикт</b><br>
                            ${data.ai_analysis.prediction === 'fake' ? '❌ ФЕЙК' : '✅ РЕАЛЬНАЯ'}
                        </div>
                        <div class="stat-card">
                            <b>Уверенность</b><br>
                            ${(data.ai_analysis.confidence * 100).toFixed(1)}%
                        </div>
                        <div class="stat-card">
                            <b>Вероятность реальности</b><br>
                            ${(data.ai_analysis.real_prob * 100).toFixed(1)}%
                        </div>
                        <div class="stat-card">
                            <b>Вероятность фейка</b><br>
                            ${(data.ai_analysis.fake_prob * 100).toFixed(1)}%
                        </div>
                    </div>
                    
                    <h4>🔍 Анализ стиля:</h4>
                    <ul>
                        ${data.ai_analysis.style_analysis.map(item => `<li>${item}</li>`).join('')}
                    </ul>
            `;
            
            if (data.source_analysis.url_provided) {
                html += `
                    <h3>🌐 Анализ источника</h3>
                    <p><b>Домен:</b> ${data.source_analysis.source_info?.domain || 'неизвестен'}</p>
                    <p><b>Балл доверия:</b> ${data.source_analysis.trust_score}/100</p>
                    <p><b>Проверок:</b> ${data.source_analysis.source_info?.total_checks || 0}</p>
                    <p><b>Флагов фейков:</b> ${data.source_analysis.source_info?.fake_flags || 0}</p>
                    
                    <button onclick="reportFake('${document.getElementById('newsUrl').value}')">🚨 Сообщить о фейке</button>
                    <button onclick="reportReal('${document.getElementById('newsUrl').value}')">✅ Подтвердить достоверность</button>
                `;
            }
            
            html += `</div>`;
            resultDiv.innerHTML = html;
        }
        
        async function reportFake(url) {
            await updateReputation(url, true);
        }
        
        async function reportReal(url) {
            await updateReputation(url, false);
        }
        
        async function updateReputation(url, isFake) {
            try {
                const response = await fetch('/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, is_fake: isFake })
                });
                
                const result = await response.json();
                alert(`Репутация обновлена! Новый балл: ${result.new_trust_score}`);
                // Переанализировать для обновления данных
                analyzeNews();
            } catch (error) {
                alert('Ошибка при обновлении репутации');
            }
        }
        
        async function updateDataset() {
            const adminResult = document.getElementById('adminResult');
            adminResult.innerHTML = '🔄 Обновление датасета...';
            
            try {
                const response = await fetch('/admin/update-dataset', {
                    method: 'POST'
                });
                
                const result = await response.json();
                if (result.success) {
                    adminResult.innerHTML = `✅ ${result.message}`;
                } else {
                    adminResult.innerHTML = `❌ Ошибка: ${result.error}`;
                }
            } catch (error) {
                adminResult.innerHTML = `❌ Ошибка сети: ${error.message}`;
            }
        }
        
        async function checkStatus() {
            const adminResult = document.getElementById('adminResult');
            adminResult.innerHTML = '📊 Проверка статуса...';
            
            try {
                const response = await fetch('/admin/status');
                const status = await response.json();
                
                adminResult.innerHTML = `
                    <b>Статус системы:</b><br>
                    • Датасет: ${status.dataset_ready ? '✅ готов' : '❌ отсутствует'}<br>
                    • Модель: ${status.model_ready ? '✅ обучена' : '❌ требуется обучение'}<br>
                    • Статус: ${status.system_status}
                `;
            } catch (error) {
                adminResult.innerHTML = `❌ Ошибка: ${error.message}`;
            }
        }
        
        function showLoading() {
            document.getElementById('result').innerHTML = `
                <div class="result medium-confidence">
                    <p>🔄 Анализируем новость... Это займет несколько секунд.</p>
                </div>
            `;
        }
        
        function showError(message) {
            document.getElementById('result').innerHTML = `
                <div class="result low-confidence">
                    <p>❌ ${message}</p>
                </div>
            `;
        }
        
        function clearForm() {
            document.getElementById('newsText').value = '';
            document.getElementById('newsUrl').value = '';
            document.getElementById('result').innerHTML = '';
            document.getElementById('adminResult').innerHTML = '';
        }
        
        function showExample() {
            document.getElementById('newsText').value = 
                'ШОК! Ученые обнаружили, что вакцины вызывают неизлечимые болезни! Врачи десятилетиями скрывали эту правду от общественности!';
            document.getElementById('newsUrl').value = 'https://example-fake-news.ru';
        }
    </script>
</body>
</html>
